name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dinolab-web:
    name: DINOLAB web (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dinolab/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dinolab/web/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint (ESLint)
        run: npm run lint
      
      - name: Type check (TypeScript)
        run: npm run type-check
      
      - name: Build (Vite)
        run: npm run build
      
      - name: Measure build artifacts
        if: always()
        run: |
          echo "=== Build Artifacts ==="
          if [ -d "dist" ]; then
            du -sh dist
            find dist -type f | wc -l | xargs echo "Total files:"
          fi
      
      - name: Unit tests (Vitest/Jest)
        run: npm run test
      
      - name: Build passed
        if: success()
        run: echo "Build passed. Ready for manual deployment review."
