name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dinolab-web:
    name: DINOLAB web (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dinolab/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dinolab/web/package-lock.json
      - run: npm ci
      - run: npm run build

  api-platform:
    name: DemoPulse API (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-coverage
          path: coverage/
          retention-days: 30

  api-build:
    name: DemoPulse build
    runs-on: ubuntu-latest
    needs: [api-platform]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-api-platform
          path: dist/
          retention-days: 7
