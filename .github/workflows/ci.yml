name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  dinolab-web:
    name: DINOLAB web (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dinolab/web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dinolab/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint and typecheck
        run: npm run lint

      - name: Build with Vite
        run: npm run build

      - name: Run unit tests
        run: npm run test

      - name: Run smoke tests
        run: bash ../../dinolab/web/smoke-test.sh

      - name: Report build success
        if: success()
        run: echo "✓ CI pipeline passed: lint, build, unit tests, and smoke tests all successful."

      - name: Report build failure
        if: failure()
        run: |
          echo "✗ CI pipeline failed. Review logs above for details."
          exit 1
