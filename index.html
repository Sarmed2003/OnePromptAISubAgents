<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Run</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #222;
            font-family: Arial, sans-serif;
        }

        #gameContainer {
            position: relative;
            width: 600px;
            height: 800px;
            background-color: #f0f0f0;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #gameOverScreen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        #gameOverScreen.show {
            display: flex;
        }

        #gameOverText {
            font-size: 48px;
            color: #fff;
            font-weight: bold;
        }

        #finalScore {
            font-size: 36px;
            color: #ffd700;
        }

        #restartButton {
            padding: 15px 40px;
            font-size: 24px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        #restartButton:hover {
            background-color: #45a049;
        }

        #restartButton:active {
            background-color: #3d8b40;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="600" height="800"></canvas>
        <div id="gameOverScreen">
            <div id="gameOverText">GAME OVER</div>
            <div id="finalScore">Final Score: <span id="scoreValue">0</span></div>
            <button id="restartButton">Restart Game</button>
        </div>
    </div>

    <script>
        // Game constants
        const CANVAS_WIDTH = 600;
        const CANVAS_HEIGHT = 800;
        const LANE_WIDTH = CANVAS_WIDTH / 3;
        const NUM_LANES = 3;
        const PLAYER_SIZE = 30;
        const OBSTACLE_WIDTH = 80;
        const OBSTACLE_HEIGHT = 40;
        const COIN_RADIUS = 12;
        const BASE_SCROLL_SPEED = 5;
        const BASE_SPAWN_RATE = 0.02;
        const MAX_SPAWN_RATE = 0.08;

        // Game state
        let gameState = {
            isGameOver: false,
            score: 0,
            playerLane: 1,
            obstacles: [],
            coins: [],
            scrollOffset: 0,
            frameCount: 0,
            spawnCounter: 0,
            difficulty: 1
        };

        // Input state
        const keys = {};

        // DOM elements
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const scoreValueSpan = document.getElementById('scoreValue');
        const restartButton = document.getElementById('restartButton');

        // Event listeners
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            handlePlayerMovement(e.key);
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        restartButton.addEventListener('click', restartGame);

        function handlePlayerMovement(key) {
            if (gameState.isGameOver) return;

            if (key === 'ArrowLeft' || key === 'a' || key === 'A') {
                if (gameState.playerLane > 0) {
                    gameState.playerLane--;
                }
            } else if (key === 'ArrowRight' || key === 'd' || key === 'D') {
                if (gameState.playerLane < NUM_LANES - 1) {
                    gameState.playerLane++;
                }
            }
        }

        function getLaneX(lane) {
            return lane * LANE_WIDTH + LANE_WIDTH / 2;
        }

        function spawnObstacle() {
            const lane = Math.floor(Math.random() * NUM_LANES);
            const x = getLaneX(lane);
            gameState.obstacles.push({
                x: x,
                y: -OBSTACLE_HEIGHT,
                lane: lane,
                width: OBSTACLE_WIDTH,
                height: OBSTACLE_HEIGHT
            });
        }

        function spawnCoin() {
            const lane = Math.floor(Math.random() * NUM_LANES);
            const x = getLaneX(lane);
            gameState.coins.push({
                x: x,
                y: -COIN_RADIUS * 2,
                lane: lane,
                radius: COIN_RADIUS
            });
        }

        function updateDifficulty() {
            gameState.difficulty = 1 + Math.floor(gameState.score / 10) * 0.15;
        }

        function updateGameState() {
            if (gameState.isGameOver) return;

            gameState.frameCount++;
            gameState.scrollOffset += BASE_SCROLL_SPEED;

            // Update difficulty
            updateDifficulty();

            // Spawn obstacles
            const currentSpawnRate = Math.min(BASE_SPAWN_RATE * gameState.difficulty, MAX_SPAWN_RATE);
            gameState.spawnCounter += currentSpawnRate;
            if (gameState.spawnCounter >= 1) {
                spawnObstacle();
                gameState.spawnCounter = 0;
            }

            // Spawn coins (less frequently than obstacles)
            if (gameState.frameCount % 40 === 0) {
                spawnCoin();
            }

            // Update obstacles
            gameState.obstacles = gameState.obstacles.filter(obstacle => {
                obstacle.y += BASE_SCROLL_SPEED;
                return obstacle.y < CANVAS_HEIGHT;
            });

            // Update coins
            gameState.coins = gameState.coins.filter(coin => {
                coin.y += BASE_SCROLL_SPEED;
                return coin.y < CANVAS_HEIGHT;
            });

            // Check collisions with obstacles
            checkObstacleCollisions();

            // Check collisions with coins
            checkCoinCollisions();
        }

        function checkObstacleCollisions() {
            const playerX = getLaneX(gameState.playerLane);
            const playerY = CANVAS_HEIGHT - 60;

            for (let obstacle of gameState.obstacles) {
                const obstacleLeft = obstacle.x - obstacle.width / 2;
                const obstacleRight = obstacle.x + obstacle.width / 2;
                const obstacleTop = obstacle.y;
                const obstacleBottom = obstacle.y + obstacle.height;

                const playerLeft = playerX - PLAYER_SIZE / 2;
                const playerRight = playerX + PLAYER_SIZE / 2;
                const playerTop = playerY - PLAYER_SIZE / 2;
                const playerBottom = playerY + PLAYER_SIZE / 2;

                if (playerRight > obstacleLeft &&
                    playerLeft < obstacleRight &&
                    playerBottom > obstacleTop &&
                    playerTop < obstacleBottom) {
                    triggerGameOver();
                    return;
                }
            }
        }

        function checkCoinCollisions() {
            const playerX = getLaneX(gameState.playerLane);
            const playerY = CANVAS_HEIGHT - 60;

            for (let i = gameState.coins.length - 1; i >= 0; i--) {
                const coin = gameState.coins[i];
                const dx = playerX - coin.x;
                const dy = playerY - coin.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < PLAYER_SIZE / 2 + coin.radius) {
                    gameState.score++;
                    scoreValueSpan.textContent = gameState.score;
                    gameState.coins.splice(i, 1);
                }
            }
        }

        function triggerGameOver() {
            gameState.isGameOver = true;
            scoreValueSpan.textContent = gameState.score;
            gameOverScreen.classList.add('show');
        }

        function restartGame() {
            gameState = {
                isGameOver: false,
                score: 0,
                playerLane: 1,
                obstacles: [],
                coins: [],
                scrollOffset: 0,
                frameCount: 0,
                spawnCounter: 0,
                difficulty: 1
            };
            scoreValueSpan.textContent = '0';
            gameOverScreen.classList.remove('show');
        }

        function drawBackground() {
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // Draw lane dividers
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 10]);

            for (let i = 1; i < NUM_LANES; i++) {
                const x = i * LANE_WIDTH;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, CANVAS_HEIGHT);
                ctx.stroke();
            }
            ctx.setLineDash([]);

            // Draw ground
            ctx.fillStyle = '#90EE90';
            ctx.fillRect(0, CANVAS_HEIGHT - 100, CANVAS_WIDTH, 100);
        }

        function drawPlayer() {
            const playerX = getLaneX(gameState.playerLane);
            const playerY = CANVAS_HEIGHT - 60;

            // Draw player body (purple circle)
            ctx.fillStyle = '#9370DB';
            ctx.beginPath();
            ctx.arc(playerX, playerY, PLAYER_SIZE / 2, 0, Math.PI * 2);
            ctx.fill();

            // Draw left eye
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(playerX - 8, playerY - 5, 4, 0, Math.PI * 2);
            ctx.fill();

            // Draw right eye
            ctx.beginPath();
            ctx.arc(playerX + 8, playerY - 5, 4, 0, Math.PI * 2);
            ctx.fill();

            // Draw pupils
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(playerX - 8, playerY - 5, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(playerX + 8, playerY - 5, 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawObstacles() {
            ctx.fillStyle = '#FF4444';
            for (let obstacle of gameState.obstacles) {
                ctx.fillRect(
                    obstacle.x - obstacle.width / 2,
                    obstacle.y,
                    obstacle.width,
                    obstacle.height
                );
            }
        }

        function drawCoins() {
            for (let coin of gameState.coins) {
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(coin.x, coin.y, coin.radius, 0, Math.PI * 2);
                ctx.fill();

                // Draw coin shine
                ctx.strokeStyle = '#FFF';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(coin.x - 4, coin.y - 4, 3, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        function drawScore() {
            ctx.fillStyle = '#000';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('Score: ' + gameState.score, 20, 40);
        }

        function render() {
            drawBackground();
            drawObstacles();
            drawCoins();
            drawPlayer();
            drawScore();
        }

        function gameLoop() {
            updateGameState();
            render();
            requestAnimationFrame(gameLoop);
        }

        // Start the game
        gameLoop();
    </script>
</body>
</html>
