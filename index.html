<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0e27">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230a0e27' width='100' height='100'/><circle cx='50' cy='50' r='40' fill='%2300ffff'/></svg>">
    <title>3D Endless Runner - Babylon.js</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Babylon.js render canvas -->
    <canvas id="renderCanvas"></canvas>

    <!-- HUD overlay with score and speed displays -->
    <div id="hud">
        <div id="scoreDisplay">Score: 0</div>
        <div id="speedDisplay">Speed: 0</div>
    </div>

    <!-- Game-over modal -->
    <div id="gameOverModal">
        <div class="game-over-content">
            <h1>GAME OVER</h1>
            <p>Final Score:</p>
            <div id="finalScore">0</div>
            <button class="restart-btn" onclick="window.restartGame()">RESTART GAME</button>
        </div>
    </div>

    <!-- Load Babylon.js from CDN first -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>

    <!-- Task 003: Scene setup and camera/lighting -->
    <script src="js/scene.js"></script>

    <!-- Task 004: Ground/terrain -->
    <script src="js/ground.js"></script>

    <!-- Task 005: Player 3D model and controller -->
    <script src="js/player.js"></script>

    <!-- Task 006: Obstacles -->
    <script src="js/obstacles.js"></script>

    <!-- Task 007: Collectible coins -->
    <script src="js/coins.js"></script>

    <!-- Task 008: Input handler for keyboard/controls -->
    <script src="js/input.js"></script>

    <!-- Task 009: Collision detection -->
    <script src="js/collision.js"></script>

    <!-- Task 010: Particle effects and visual effects -->
    <script src="js/particles.js"></script>

    <!-- Task 011: UI and HUD updates -->
    <script src="js/ui.js"></script>

    <!-- Task 012: Main game loop and state management -->
    <script src="js/game.js"></script>
</body>
</html>
